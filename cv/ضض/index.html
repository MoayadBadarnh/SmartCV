<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Name — CV</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="theme-engineering">
  <div class="theme-bg"></div>
  <div class="overlay"></div>
  <header>
    <div class="profile-container">
      <img class="profile-img" src="https://ui-avatars.com/api/?name=Your+Name&background=535d0a&color=fff&size=150" alt="Your Name">
    </div>
    <h1 class="profile-name">Your Name</h1>
    <p class="profile-title">Your Title</p>
    <div class="social-icons"><a href="مةسث" target="_blank" rel="noopener" class="social-icon"><svg viewBox="0 0 24 24"><path d="M4.98 3.5C4.98 4.88 3.87 6 2.5 6S0 4.88 0 3.5 1.12 1 2.5 1s2.48 1.12 2.48 2.5zM.5 8h4V23h-4V8zM8.5 8h3.8v2.05h.05c.53-1 1.83-2.05 3.77-2.05 4.03 0 4.78 2.65 4.78 6.1V23h-4v-6.9c0-1.65-.03-3.77-2.3-3.77-2.3 0-2.65 1.8-2.65 3.65V23h-4V8z"/></svg></a></div>
    
    <nav><ul>
      <li><a href="#about">About Me</a></li>
      <li><a href="#myWork">My Work</a></li>
    </ul></nav>
  </header>
  <hr/>
  <section id="about" class="glass-box">
    <h2>About Me</h2>
    <p id="aboutText">No info yet.</p>
  </section>
  <hr/>
  <section id="myWork" class="glass-box">
    <h2>My Work</h2>
    <p>No projects added yet.</p>
  </section>
  <div style="text-align:center;margin-bottom:60px">
    <button class="btn-pdf" style="max-width:260px;margin:0 auto" onclick="saveAsPDF()">📄 Save as PDF (ATS-Friendly)</button>
  </div>
  <div id="atsPrintArea"></div>
<script>
const audioEl = document.getElementById('audio');
if (audioEl) {
  const playBtn = document.getElementById('playBtn');
  const progressEl = document.getElementById('progress');
  const progressContainer = document.getElementById('progressContainer');
  playBtn.addEventListener('click', () => {
    if (audioEl.paused) { audioEl.play(); playBtn.textContent = '❚❚'; }
    else { audioEl.pause(); playBtn.textContent = '▶'; }
  });
  audioEl.addEventListener('timeupdate', () => {
    if (!audioEl.duration) return;
    progressEl.style.width = (audioEl.currentTime / audioEl.duration * 100) + '%';
  });
  progressContainer.addEventListener('click', (e) => {
    audioEl.currentTime = (e.offsetX / progressContainer.clientWidth) * audioEl.duration;
  });
}

function saveAsPDF() {
  const name = "Your Name";
  const title = "Your Title";
  const about = document.getElementById('aboutText').innerText;
  const contacts = ["مةسث"];
  const projects = [];
  let html = '<h1>' + name + '</h1><h3>' + title + '</h3>';
  html += '<p class="contact-line">' + contacts.join(' | ') + '</p>';
  html += '<h2>About Me</h2><p>' + about + '</p>';
  html += '<h2>Projects</h2>';
  projects.forEach(p => { html += '<p class="project-line"><strong>' + p.name + '</strong>' + (p.link ? ' - ' + p.link : '') + '</p>'; });
  document.getElementById('atsPrintArea').innerHTML = html;
  window.print();
}
</script>
</body>
</html>
