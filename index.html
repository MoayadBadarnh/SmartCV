<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartCV</title>
    <link rel="icon" type="image/png" sizes="32x32" href="images/image.png">
    <link rel="stylesheet" href="style.css"/>
</head>
<body>

<!-- ===== خلفية الفيديو ===== -->
<video class="video-background" autoplay muted loop playsinline>
    <source src="vedio/vedio.mp4" type="video/mp4">
</video>
<div class="overlay"></div>

<!-- ===== لوحة التحرير (يسار) ===== -->
<aside class="editor-panel">
    <h3 class="editor-title">✏️ Edit Your CV</h3>

    <div class="input-group">
        <label>Profile Photo</label>
        <label class="file-label" for="profileImage">📷 Choose Photo</label>
        <input type="file" id="profileImage" accept="image/*" style="display:none">
    </div>

    <div class="input-group">
        <label>Full Name</label>
        <input type="text" id="fullName" placeholder="Moayad Al-Badarneh">
    </div>

    <div class="input-group">
        <label>Your Title</label>
        <input type="text" id="titleInput" placeholder="Full-Stack Developer">
    </div>

    <div class="input-group">
        <label>LinkedIn URL</label>
        <input type="url" id="linkedinInput" placeholder="https://linkedin.com/in/...">
    </div>

    <div class="input-group">
        <label>About Section ID (optional)</label>
        <input type="text" id="aboutInput" placeholder="#about" value="#about">
    </div>

    <div class="input-group">
        <label>Work Section ID (optional)</label>
        <input type="text" id="workInput" placeholder="#myWork" value="#myWork">
    </div>

    <button class="btn-primary" onclick="updateAll()">▶ Apply Changes</button>
</aside>

<!-- ===== معاينة السيرة ===== -->
<main class="cv-preview">

    <!-- Header -->
    <header>
        <div class="profile-container">
            <img id="previewImg" class="profile-img" src="https://ui-avatars.com/api/?name=Your+Name&background=535d0a&color=fff&size=150" alt="Profile">
        </div>

        <!-- مشغل الصوت -->
        <div class="audio-player">
            <button id="playBtn">▶</button>
            <div class="progress-container" id="progressContainer">
                <div class="progress" id="progress"></div>
            </div>
        </div>

        <audio id="audio">
            <source src="voice/beard.mp3" type="audio/mpeg">
        </audio>

        <h2 class="profile-name" id="displayName">Your Name</h2>
        <p class="profile-title" id="displayTitle">Your Title</p>

        <nav class="navigation">
            <ul>
                <li><a href="#about" id="aboutLink">About Me</a></li>
                <li><a href="#" id="linkedinLink" target="_blank">LinkedIn</a></li>
                <li><a href="#myWork" id="workLink">My Work</a></li>
            </ul>
        </nav>
    </header>

    <hr/>

    <!-- About Me -->
    <section id="about" class="glass-box">
        <h2>About Me</h2>
        <textarea id="aboutMe" class="about-input" placeholder="Write something about yourself..."></textarea>
    </section>

    <hr/>

    <!-- My Work -->
    <section id="myWork" class="glass-box">
        <h2>My Work</h2>
        <div id="projectsContainer">
            <input type="text" class="project-input" placeholder="Project Name">
        </div>
        <button class="btn-secondary" id="addProjectBtn">+ Add Project</button>
    </section>

</main>

<!-- ===== Scripts ===== -->
<script>
// ---- صورة البروفايل ----
document.getElementById("profileImage").addEventListener("change", function(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (event) => {
        document.getElementById("previewImg").src = event.target.result;
    };
    reader.readAsDataURL(file);
});

// ---- تحديث كل شيء دفعة واحدة ----
function updateAll() {
    const name  = document.getElementById("fullName").value.trim();
    const title = document.getElementById("titleInput").value.trim();

    document.getElementById("displayName").innerText  = name  || "Your Name";
    document.getElementById("displayTitle").innerText = title || "Your Title";

    const linkedin = document.getElementById("linkedinInput").value.trim();
    document.getElementById("linkedinLink").href = linkedin || "#";

    document.getElementById("aboutLink").href =
        document.getElementById("aboutInput").value.trim() || "#about";

    document.getElementById("workLink").href =
        document.getElementById("workInput").value.trim() || "#myWork";
}

// ---- تحديث فوري عند الكتابة ----
document.getElementById("fullName").addEventListener("input", () => {
    const v = document.getElementById("fullName").value.trim();
    document.getElementById("displayName").innerText = v || "Your Name";
});
document.getElementById("titleInput").addEventListener("input", () => {
    const v = document.getElementById("titleInput").value.trim();
    document.getElementById("displayTitle").innerText = v || "Your Title";
});

// ---- إضافة مشاريع ----
document.getElementById("addProjectBtn").addEventListener("click", () => {
    const input = document.createElement("input");
    input.type = "text";
    input.placeholder = "Project Name";
    input.classList.add("project-input");
    document.getElementById("projectsContainer").appendChild(input);
});

// ---- مشغل الصوت ----
const audio             = document.getElementById("audio");
const playBtn           = document.getElementById("playBtn");
const progressEl        = document.getElementById("progress");
const progressContainer = document.getElementById("progressContainer");

playBtn.addEventListener("click", () => {
    if (audio.paused) { audio.play();  playBtn.textContent = "❚❚"; }
    else              { audio.pause(); playBtn.textContent = "▶";  }
});

audio.addEventListener("timeupdate", () => {
    if (!audio.duration) return;
    progressEl.style.width = (audio.currentTime / audio.duration * 100) + "%";
});

progressContainer.addEventListener("click", (e) => {
    audio.currentTime = (e.offsetX / progressContainer.clientWidth) * audio.duration;
});

audio.addEventListener("ended", () => { playBtn.textContent = "▶"; });
</script>
    <!-- زر Generate -->
<div class="glass-box" style="text-align:center; margin: 20px auto; width:65%">
    <h2>🚀 Get Your CV Link</h2>
    
    <div class="input-group" style="width:80%; margin: 15px auto">
        <label>Choose Your Username</label>
        <input type="text" id="cvUsername" placeholder="ahmed-ali">
    </div>

    <button class="btn-primary" onclick="generateCV()" id="generateBtn">
        🚀 Generate My CV Link
    </button>

    <div id="resultBox" style="display:none; margin-top:20px">
        <p style="color:#a4b465; margin-bottom:10px">✅ Your CV is live at:</p>
        <a id="cvLink" href="#" target="_blank" 
           style="color:#fff; font-size:16px; word-break:break-all"></a>
    </div>
</div>

<script>
async function generateCV() {
    const username = document.getElementById("cvUsername").value.trim();
    if (!username) { alert("اكتب username أولاً!"); return; }

    const btn = document.getElementById("generateBtn");
    btn.textContent = "⏳ جاري الإنشاء...";
    btn.disabled = true;

    const name    = document.getElementById("displayName").innerText;
    const title   = document.getElementById("displayTitle").innerText;
    const about   = document.getElementById("aboutMe").value;
    const projects = [...document.querySelectorAll(".project-input")]
        .map(i => i.value).filter(Boolean);

    const htmlContent = `<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>${name} — CV</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:#1a1f15;font-family:'Poppins',sans-serif;color:#fff}
    header{text-align:center;padding:60px 20px 30px}
    h1{font-size:40px}
    .subtitle{color:#a4b465;font-size:20px;margin-top:8px}
    section{width:65%;margin:30px auto;background:rgba(255,255,255,0.07);
            backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,0.15);
            border-radius:18px;padding:40px}
    h2{color:#a4b465;margin-bottom:16px}
    p{line-height:1.8;color:#ddd}
    .project{background:rgba(255,255,255,0.1);padding:12px;
             border-radius:10px;margin:8px 0;color:#fff}
  </style>
</head>
<body>
  <header>
    <h1>${name}</h1>
    <p class="subtitle">${title}</p>
  </header>
  <section>
    <h2>About Me</h2>
    <p>${about}</p>
  </section>
  <section>
    <h2>My Work</h2>
    ${projects.map(p => `<div class="project">${p}</div>`).join("")}
  </section>
</body>
</html>`;

    try {
        const res = await fetch("https://smartcv.mwydbdarnt.workers.dev", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ username, htmlContent }),
        });

        const data = await res.json();

        if (data.url) {
            document.getElementById("resultBox").style.display = "block";
            const link = document.getElementById("cvLink");
            link.href = data.url;
            link.textContent = data.url;
        } else {
            alert("خطأ: " + data.error);
        }
    } catch (e) {
        alert("حدث خطأ، تأكد من الاتصال");
    } finally {
        btn.textContent = "🚀 Generate My CV Link";
        btn.disabled = false;
    }
}
</script>
</body>
</html>
